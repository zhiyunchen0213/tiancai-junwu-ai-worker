id: commentary
kind: commentary
name: 解说赛道 (YouTube Shorts style)
description: Gemini 分析视频 → Claude 写英文网感五段解说 → ElevenLabs TTS，不合成视频，只给剪辑素材
version: "2.0"
created_at: "2026-04-15"
updated_at: "2026-04-22"
author: tiancai

# 子模式：第三人称旁白 vs 第一视角角色自述
pov_modes: [third_person, first_person]
default_pov_mode: third_person

# 第一视角模式下，Phase A 额外跑角色识别
character_identification:
  enabled_when_pov_mode: first_person
  provider: gemini
  min_candidates: 1
  max_candidates: 5

# TTS — routed via Kie async job (elevenlabs/text-to-dialogue-v3)
# 第三人称固定 voice；第一视角用 G1 审核员选的 voice_id
tts:
  provider: kie
  default_voice_id: "Brian"
  stability: 0.5

# Script writer — 两套 prompt 按 pov_mode 切换
script:
  provider: kie
  model: claude-sonnet-4-6
  style: "美式网感，150wpm 节奏（软提示）"
  structure: ["hook", "events", "tease", "cta", "reveal"]
  prompts:
    third_person: narration_prompt.md
    first_person: narration_prompt_1p.md
  cta_rotation: random
